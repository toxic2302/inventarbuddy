name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: inventarbuddy
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Make mvnw executable
      run: chmod +x mvnw

    - name: Build and Test with Maven
      run: ./mvnw -B test
      env:
        # Disable Vault for tests in CI
        SPRING_CLOUD_VAULT_ENABLED: false
        # Database connection details (matching the postgres service)
        DATABASE_URL: jdbc:postgresql://localhost:5432/inventarbuddy
        DATABASE_USER: dev
        DATABASE_PASSWORD: pass
        # Additional settings to ensure tests run smoothly
        SPRING_DOCKER_COMPOSE_ENABLED: false
